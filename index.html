<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bathysphere - Reading Comprehension Questions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .book-selector {
            margin-bottom: 30px;
        }
        
        .book-info label {
            display: block;
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
            font-size: 14px;
        }
        
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            margin-bottom: 20px;
            font-family: inherit;
            cursor: pointer;
        }
        
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        select:disabled {
            background-color: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }
        
        .book-meta {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        
        .meta-item {
            margin: 8px 0;
            font-size: 14px;
            color: #555;
        }
        
        .meta-label {
            font-weight: 600;
            color: #333;
        }
        
        .settings {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }
        
        .form-group select {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 0;
        }
        
        button {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 40px 0;
        }
        
        .results {
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .results h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        
        .question-type-section {
            margin-bottom: 40px;
        }
        
        .question-type-header {
            background: #667eea;
            color: white;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .question-card {
            background: #f9f9f9;
            border-left: 5px solid #667eea;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 6px;
        }
        
        .question-number {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 6px;
            font-size: 13px;
        }
        
        .standard-label {
            font-size: 11px;
            color: #999;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .question-text {
            color: #333;
            margin-bottom: 15px;
            line-height: 1.6;
            font-size: 16px;
            font-weight: 500;
        }
        
        .answer-key {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 12px;
        }
        
        .answer-key-label {
            font-weight: 700;
            color: #1976D2;
            display: block;
            margin-bottom: 6px;
            font-size: 11px;
        }
        
        .answer-key-text {
            color: #1565C0;
            font-size: 14px;
            line-height: 1.5;
            font-style: italic;
        }
        
        .follow-up-section {
            background: #f0f7ff;
            padding: 12px;
            border-radius: 4px;
            margin-top: 12px;
            border-left: 3px solid #64B5F6;
        }
        
        .follow-up-label {
            font-weight: 600;
            color: #1565C0;
            font-size: 12px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        
        .follow-up-item {
            color: #1565C0;
            font-size: 13px;
            margin-bottom: 6px;
            line-height: 1.5;
        }
        
        .follow-up-item:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Bathysphere</h1>
            <p>Select a book, view its grade level, and generate comprehension questions aligned to California ELA standards</p>
        </div>
        
        <div class="content">
            <div class="book-selector">
                <div class="book-info">
                    <label for="bookSelect">Choose a Book:</label>
                    <select id="bookSelect" onchange="updateBookInfo()">
                        <option value="">-- Select a Book --</option>
                        
                        <optgroup label="Early Elementary (K-2)">
                            <option value="aesop">Aesop's Fables</option>
                            <option value="fairy">Fairy Tales by Hans Christian Andersen</option>
                        </optgroup>
                        
                        <optgroup label="Upper Elementary (3-5)">
                            <option value="charlotte">Charlotte's Web</option>
                            <option value="alice">Alice's Adventures in Wonderland</option>
                            <option value="jungle">The Jungle Book</option>
                        </optgroup>
                        
                        <optgroup label="Middle School (5-6)">
                            <option value="island">Island of the Blue Dolphins</option>
                        </optgroup>
                        
                        <optgroup label="Middle School (6-8)">
                            <option value="littlewomen">Little Women</option>
                            <option value="treasure">Treasure Island</option>
                            <option value="sherlock">Adventures of Sherlock Holmes</option>
                        </optgroup>
                        
                        <optgroup label="High School (9-12)">
                            <option value="moby">Moby Dick</option>
                            <option value="dracula">Dracula</option>
                            <option value="jane">Jane Eyre</option>
                        </optgroup>
                    </select>
                    
                    <div class="book-meta">
                        <div class="meta-item"><span class="meta-label">Title:</span> <span id="bookTitle">Select a book</span></div>
                        <div class="meta-item"><span class="meta-label">Grade Level:</span> <span id="bookGrade">-</span></div>
                        <div class="meta-item"><span class="meta-label">Author:</span> <span id="bookAuthor">-</span></div>
                    </div>
                </div>
            </div>
            
            <div class="divider"></div>
            
            <div class="settings">
                <div class="form-group">
                    <label for="gradeLevel">Grade Level:</label>
                    <select id="gradeLevel">
                        <option value="">Select a book first</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="numQuestions">Number of Questions:</label>
                    <select id="numQuestions">
                        <option value="5">5 Questions</option>
                        <option value="7">7 Questions</option>
                        <option value="10" selected>10 Questions</option>
                    </select>
                </div>
            </div>
            
            <button onclick="generateQuestions()">Generate Questions with Answer Keys</button>
            
            <div class="results" id="results">
                <h2>Generated Questions & Answer Keys</h2>
                <div id="questionsContainer"></div>
            </div>
        </div>
    </div>
    
    <script>
        const books = {
            aesop: {
                title: "Aesop's Fables",
                grades: ["K-2", "3-5"],
                author: "Aesop",
                questions: {
                    "K-2": [
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.1.1", q: "What animal wins the race against the Hare?", a: "The Tortoise.", f: ["Why does the Tortoise win even though he is slower?", "Can you describe what the Hare does instead of racing?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.1.3", q: "Why does the Hare fall asleep during the race?", a: "He is so confident he will win that he decides to rest.", f: ["What might have happened if the Hare had stayed awake?", "Do you think the Hare's confidence was justified?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.1.1", q: "Who helps the Lion when he is trapped in the net?", a: "The Mouse helps the Lion.", f: ["How does the Mouse free the Lion?", "Why does the Lion listen to the Mouse's plea for mercy?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.1.3", q: "What does the Tortoise's behavior show about his character?", a: "He is patient, determined, and doesn't give up.", f: ["How would the story be different if the Tortoise had given up?", "Why is perseverance more important than speed?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.1.2", q: "Why is the Hare's speed not enough to win?", a: "Because he is overconfident and wastes his advantage by sleeping.", f: ["What other weaknesses does the Hare show?", "How does overconfidence lead to failure?"] },
                        { type: "Analytical", standard: "CCSS.ELA-LITERACY.RL.1.5", q: "How are the Tortoise and the Mouse similar in these fables?", a: "Both are small or slow but prove they are valuable and helpful.", f: ["What do these characters have in common besides size?", "What is the lesson both fables teach about judging others?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.1.6", q: "Do you think the Hare should have won? Why or why not?", a: "No, because he didn't try his best; he was careless and lazy.", f: ["If you were the Hare, what would you do differently?", "Is there ever a time when the fastest or strongest person should win?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.1.2", q: "Which lesson is more important: slow and steady wins, or kindness to all?", a: "Answers will vary, but both teach valuable lessons about character.", f: ["Why might both lessons be important for living well?", "Can you think of a time when you learned one of these lessons?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.1.1", q: "What does the Mouse do to free the Lion from the net?", a: "He gnaws through the ropes with his teeth.", f: ["Why is the Mouse able to do something the strong Lion cannot?", "What does this tell us about different kinds of strength?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.1.3", q: "What does the Lion learn from the Mouse's kindness?", a: "That even the smallest creature can be important and helpful.", f: ["Why did the Lion originally not value the Mouse?", "How does this change the Lion's perspective?"] }
                    ],
                    "3-5": [
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.3.1", q: "Who are the two main characters in 'The Tortoise and the Hare'?", a: "The Tortoise and the Hare.", f: ["What role does each character play in the story?", "Are there other important characters we should remember?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.3.3", q: "How does the race end?", a: "The Tortoise wins the race.", f: ["What is the Hare doing when the Tortoise finishes?", "Why doesn't the Hare wake up in time?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.3.1", q: "How does the Mouse help the Lion?", a: "By chewing through the ropes that trap him in the hunter's net.", f: ["What equipment or special powers does the Mouse need to do this?", "Why can't the Lion free himself?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.3.3", q: "What character trait does the Hare lack?", a: "Humility and the ability to take his competitor seriously.", f: ["How does the Hare's attitude affect his performance?", "What would happen if the Hare showed more respect for the Tortoise?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.3.2", q: "Why is the Tortoise successful despite being slow?", a: "He is persistent, focused, and does not get distracted.", f: ["What distracts the Hare that doesn't distract the Tortoise?", "How do these personality differences affect the outcome?"] },
                        { type: "Analytical", standard: "CCSS.ELA-LITERACY.RL.3.2", q: "What is the main lesson of 'The Tortoise and the Hare'?", a: "Steady effort and perseverance are more valuable than natural talent alone.", f: ["How does the story prove this lesson?", "Can you think of other examples where this is true?"] },
                        { type: "Analytical", standard: "CCSS.ELA-LITERACY.RL.3.5", q: "How do both fables teach similar lessons?", a: "Both show that size, speed, and strength are less important than character and determination.", f: ["What character traits help the Tortoise and Mouse succeed?", "Why does Aesop tell these two stories together?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.3.6", q: "Which character do you admire more: the Tortoise or the Mouse? Why?", a: "Answers vary; both show admirable qualities like persistence and courage.", f: ["What specific actions make each character admirable?", "Who would you want as a friend and why?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.3.2", q: "Why do you think Aesop told these stories?", a: "To teach moral lessons about good character and values.", f: ["What values does Aesop want us to learn?", "Are these lessons still important today?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.3.3", q: "What does the Lion learn from the Mouse's kindness?", a: "That even the smallest creature can be important and helpful.", f: ["Why did the Lion originally not value the Mouse?", "How does this change the Lion's perspective?"] }
                    ]
                }
            },
            fairy: {
                title: "Fairy Tales by Hans Christian Andersen",
                grades: ["K-2", "3-5"],
                author: "Hans Christian Andersen",
                questions: {
                    "K-2": [
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.1.1", q: "What do the other ducklings do to the Ugly Duckling?", a: "They tease him and call him names.", f: ["Why do they treat him this way?", "How does the Ugly Duckling react?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.1.3", q: "Where does the Ugly Duckling go when he leaves home?", a: "He runs away into the woods and marshes.", f: ["What does he encounter there?", "Is this a safe place for him?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.1.1", q: "What season finally comes to help the Ugly Duckling?", a: "Spring comes, and he can swim again.", f: ["What changes when spring arrives?", "Why is spring important to the story?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.1.3", q: "Who finally accepts the Ugly Duckling as he is?", a: "The other swans welcome him and say he is one of them.", f: ["How do the swans treat him?", "Why is their acceptance so important?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.1.2", q: "Why do the other ducklings treat the Ugly Duckling badly?", a: "Because he looks different from them and is not like the others.", f: ["Is it right to treat someone badly because they are different?", "Why do people sometimes do this?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.1.3", q: "How does the Ugly Duckling feel when the other swans accept him?", a: "Happy, welcomed, and finally loved for who he is.", f: ["What makes him feel this way?", "Has he felt this way before?"] },
                        { type: "Analytical", standard: "CCSS.ELA-LITERACY.RL.1.5", q: "Why is the story called 'The Ugly Duckling'?", a: "Because he appears ugly at first, but beauty is revealed later.", f: ["Is the duckling really ugly, or does everyone just think so?", "What changes—the duckling or people's opinions?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.1.6", q: "Is it right that the ducklings teased the Ugly Duckling? Why?", a: "No, because it is wrong to make fun of someone for being different.", f: ["What should the ducklings have done instead?", "What would you do if you met someone different?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.1.2", q: "What would you tell someone who felt like the Ugly Duckling?", a: "That everyone is special in their own way and will find where they belong.", f: ["Has anyone ever made you feel like the Ugly Duckling?", "How can we help others feel accepted?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.1.3", q: "Describe the Ugly Duckling's appearance at the beginning of the story.", a: "He is large, gray, and looks very different from his siblings.", f: ["Why do you think he looks so different?", "Does his appearance change throughout the story?"] }
                    ],
                    "3-5": [
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.3.1", q: "Describe the Ugly Duckling's appearance at the beginning of the story.", a: "He is large, gray, and looks very different from his siblings.", f: ["Why might his appearance change?", "What hints does Andersen give about his true identity?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.3.3", q: "What hardship does the Ugly Duckling face in winter?", a: "He nearly freezes in the cold water.", f: ["How does he survive this hardship?", "What does winter represent in the story?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.3.1", q: "What do the other swans tell the Ugly Duckling when he appears?", a: "They welcome him and say he is one of them.", f: ["How does he react to this acceptance?", "Why do the swans recognize him as one of their own?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.3.2", q: "Why does Andersen include the winter season in the story?", a: "To show the Ugly Duckling's suffering and test his survival.", f: ["How would the story be different without winter?", "What does winter teach the Ugly Duckling?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.3.4", q: "What does 'ugly' really mean in this story?", a: "Not matching others' expectations, but not being bad or wrong.", f: ["Is beauty objective or subjective in this story?", "What makes something truly beautiful?"] },
                        { type: "Analytical", standard: "CCSS.ELA-LITERACY.RL.3.5", q: "How does the setting change throughout the story to reflect the Duckling's journey?", a: "From a family home to wilderness, then through winter, finally to spring and acceptance.", f: ["How does each setting match the Duckling's emotions?", "What does each place represent in his journey?"] },
                        { type: "Analytical", standard: "CCSS.ELA-LITERACY.RL.3.2", q: "What universal theme does this tale teach?", a: "That beauty and worth come in many forms and inner qualities matter most.", f: ["How do we see this theme in real life?", "Why is this message important?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.3.6", q: "Do you think the Ugly Duckling's journey was necessary? Could he have been happy before?", a: "Answers vary; the journey teaches him about himself and the world.", f: ["What would the Ugly Duckling have missed without this journey?", "Is suffering sometimes necessary for growth?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.3.3", q: "How does Andersen show compassion through this story?", a: "By showing that everyone deserves acceptance and kindness.", f: ["Who shows compassion to the Ugly Duckling?", "How do we show compassion in our own lives?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.3.3", q: "Why is his reflection so important to the story's ending?", a: "Seeing his new form helps him understand he has truly transformed.", f: ["Does the duckling physically change or do others' opinions change?", "What is the significance of him seeing his own reflection?"] }
                    ]
                }
            },
            charlotte: {
                title: "Charlotte's Web",
                grades: ["3-5"],
                author: "E.B. White",
                questions: {
                    "3-5": [
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.3.1", q: "Why does Wilbur live on the farm?", a: "He is a pig being raised by Farmer John.", f: ["What does Wilbur do on the farm?", "How does he spend his days?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.3.3", q: "Who becomes Wilbur's best friend?", a: "Charlotte, a spider who lives in the barn.", f: ["Why does Charlotte become Wilbur's friend?", "How are they different?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.3.1", q: "Why is Wilbur in danger at the beginning of the story?", a: "Because Farmer John plans to kill him and make him into bacon and ham.", f: ["Who tells Wilbur about this plan?", "How does Wilbur react?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.3.3", q: "What does Charlotte write in her web?", a: "Words like 'Some Pig,' 'Terrific,' and 'Radiant' to describe Wilbur.", f: ["Why does Charlotte write these words?", "What do these words mean?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.3.2", q: "Why does Charlotte help Wilbur?", a: "Because she cares about him and wants to save his life.", f: ["What does this show about Charlotte's character?", "Would most animals help this way?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.3.3", q: "How does Wilbur feel about Charlotte?", a: "He loves her deeply and values her friendship above everything.", f: ["What does Wilbur learn from Charlotte?", "How does Charlotte change him?"] },
                        { type: "Analytical", standard: "CCSS.ELA-LITERACY.RL.3.5", q: "How does the author show that friendship is more valuable than life itself?", a: "Through Charlotte's sacrifice—she dies to save Wilbur, showing true love.", f: ["What does Charlotte give up?", "Why is her sacrifice so powerful?"] },
                        { type: "Analytical", standard: "CCSS.ELA-LITERACY.RL.3.2", q: "What is the main theme of Charlotte's Web?", a: "That true friendship and love are eternal, even when death separates friends.", f: ["How does the story show this theme?", "What makes this message so important?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.3.6", q: "Do you think Wilbur should have tried to save Charlotte? Why or why not?", a: "Answers vary; he was powerless to stop her death, but he honors her memory.", f: ["What could Wilbur have done?", "Is there always something we can do to help a friend?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.3.4", q: "What does 'Some Pig' really mean in Charlotte's words?", a: "It means Wilbur is special, unique, and worthy of being saved and remembered.", f: ["How are Charlotte's words different from ordinary words?", "Why does language have the power to change lives?"] }
                    ]
                }
            },
            alice: {
                title: "Alice's Adventures in Wonderland",
                grades: ["3-5", "5-6"],
                author: "Lewis Carroll",
                questions: {
                    "3-5": [
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.3.1", q: "Who does Alice follow into the rabbit hole?", a: "The White Rabbit.", f: ["Why does the White Rabbit seem unusual?", "What makes Alice want to follow him?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.3.3", q: "Why is the White Rabbit in such a hurry?", a: "He is checking his watch and is late for an important appointment.", f: ["What does the watch tell us about the Rabbit's world?", "Is time important in Wonderland?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.3.1", q: "What makes Alice grow and shrink in Wonderland?", a: "Drinking potions and eating cakes labeled 'Drink Me' and 'Eat Me'.", f: ["Why do these items have labels?", "What happens each time Alice changes size?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.3.3", q: "What does Alice's decision to follow the Rabbit show about her character?", a: "She is curious and willing to explore new and strange places.", f: ["Is curiosity always a good thing?", "What dangers does Alice face because of her curiosity?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.3.2", q: "Why does Carroll describe Alice's fall in such detail?", a: "To create a dreamlike feeling and show the strange nature of Wonderland.", f: ["How does the detailed description affect how you picture the story?", "Why might Carroll want us to feel like we are dreaming?"] },

                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.9-10.3", q: "What transformation does Lucy undergo and what does it reveal?", a: "She becomes a vampire, showing the real danger Dracula poses and motivating the hunt.", f: ["How does Lucy's transformation occur?", "Could it have been prevented?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.9-10.1", q: "What is the novel's final resolution regarding Dracula and the protagonists?", a: "Dracula is destroyed, and the survivors are changed but alive and united.", f: ["How is Dracula destroyed?", "What happens to the survivors after?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.9-10.2", q: "What does the vampire represent in Victorian society?", a: "Danger, forbidden desire, threats to morality, sexuality, and traditional social values.", f: ["What Victorian anxieties does the vampire embody?", "Are vampires still relevant metaphors?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.9-10.1", q: "Why are the protagonists successful in defeating Dracula?", a: "Through teamwork, faith, science, and understanding of the vampire's vulnerabilities and limits.", f: ["What is each character's role in the victory?", "Could they have won without all these elements?"] },
                        { type: "Analytical", standard: "CCSS.ELA-LITERACY.RL.9-10.5", q: "How does Stoker use technology (telegraph, phonograph) in the novel?", a: "Modern technology helps characters combat an ancient evil, showing progress and modernity.", f: ["How does technology enable communication?", "Why does Stoker emphasize technology?"] },
                        { type: "Analytical", standard: "CCSS.ELA-LITERACY.RL.9-10.4", q: "How does Stoker balance scientific rationalism with superstition and faith?", a: "He shows that both are necessary; science alone cannot defeat supernatural evil.", f: ["When does science fail?", "When does faith succeed?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.9-10.6", q: "What is the moral message of Dracula's defeat?", a: "That good, faith, and community are stronger than evil, darkness, and isolation.", f: ["Is this message optimistic or unrealistic?", "What proof does the novel provide?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.9-10.3", q: "What does Mina's character suggest about the New Woman of the Victorian era?", a: "She is intelligent, capable, and essential to defeating evil, challenging traditional gender roles.", f: ["Is Mina progressive for her time?", "How does she compare to other female characters?"] }
                    ]
                }
            },
            jane: {
                title: "Jane Eyre",
                grades: ["9-12"],
                author: "Charlotte Brontë",
                questions: {
                    "9-12": [
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.9-10.3", q: "What traumatic experiences shape Jane's early life?", a: "She is mistreated by her aunt, bullied at boarding school, and denied love and belonging.", f: ["How do these experiences affect Jane's character?", "Does she overcome them?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.9-10.1", q: "Why does Jane leave Thornfield Hall despite her love for Rochester?", a: "She discovers that Rochester is already married to Bertha Mason, a secret he has hidden.", f: ["How does Jane discover this secret?", "Could Jane have stayed?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.9-10.1", q: "How does Jane achieve financial independence and what does it enable?", a: "She learns of her inheritance, which gives her autonomy and allows her to return to Rochester as an equal.", f: ["Why is the inheritance important?", "How does money change Jane's position?"] },
                        { type: "Literal", standard: "CCSS.ELA-LITERACY.RL.9-10.3", q: "What is the significance of Jane's refusal of St. John Rivers's proposal?", a: "She refuses to sacrifice her identity and authentic self for duty or religious obligation.", f: ["What tempts Jane to say yes?", "Why does she say no?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.9-10.2", q: "What does Jane's independence mean in the context of Victorian society?", a: "She asserts her right to choice, equality, and refusal to be subservient to men or circumstances.", f: ["How radical is Jane's independence?", "What does society expect of her?"] },
                        { type: "Inferential", standard: "CCSS.ELA-LITERACY.RL.9-10.3", q: "What does Bertha Mason represent in the novel?", a: "Jane's shadow self, the passionate nature Jane must control, and the dangers of female rebellion.", f: ["How are Jane and Bertha connected?", "Why does Bertha exist in the attic?"] },
                        { type: "Analytical", standard: "CCSS.ELA-LITERACY.RL.9-10.5", q: "How does Brontë use the Gothic and supernatural to explore Jane's psychology?", a: "Mysterious events and dark settings reflect Jane's inner turmoil and psychological journey.", f: ["What is the psychological significance of Gothic elements?", "Are they real or imaginary?"] },
                        { type: "Analytical", standard: "CCSS.ELA-LITERACY.RL.9-10.6", q: "How does Brontë challenge Victorian expectations for women through Jane?", a: "Jane refuses submission, demands equality in love, and asserts her right to independence.", f: ["What do Victorians expect of women?", "How does Jane defy these expectations?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.9-10.6", q: "What does Rochester's blindness at the novel's end signify?", a: "His humbling and redemption; he is equalized with Jane and dependent on her love rather than dominance.", f: ["Does blindness punish Rochester?", "How does it change his relationship with Jane?"] },
                        { type: "Evaluative", standard: "CCSS.ELA-LITERACY.RL.9-10.2", q: "Is Jane's ending a feminist victory or a compromise of her principles?", a: "Answers vary; she gains love but within marriage, suggesting both autonomy and traditional bonds.", f: ["What does Jane gain?", "What does she sacrifice?"] }
                    ]
                }
            }
        };
        
        function updateBookInfo() {
            const selectedBook = document.getElementById('bookSelect').value;
            const gradeLevelSelect = document.getElementById('gradeLevel');
            
            if (!selectedBook || !books[selectedBook]) {
                document.getElementById('bookTitle').textContent = 'Select a book';
                document.getElementById('bookGrade').textContent = '-';
                document.getElementById('bookAuthor').textContent = '-';
                gradeLevelSelect.innerHTML = '<option value="">Select a book first</option>';
                gradeLevelSelect.disabled = true;
                return;
            }
            
            const book = books[selectedBook];
            document.getElementById('bookTitle').textContent = book.title;
            document.getElementById('bookGrade').textContent = book.grades.join(', ');
            document.getElementById('bookAuthor').textContent = book.author;
            
            // Lock grade levels to this book
            gradeLevelSelect.innerHTML = '';
            book.grades.forEach(grade => {
                const option = document.createElement('option');
                option.value = grade;
                option.textContent = 'Grade ' + grade;
                gradeLevelSelect.appendChild(option);
            });
            gradeLevelSelect.disabled = false;
        }
        
        function generateQuestions() {
            const selectedBook = document.getElementById('bookSelect').value;
            const gradeLevel = document.getElementById('gradeLevel').value;
            const numQuestions = parseInt(document.getElementById('numQuestions').value);
            
            if (!selectedBook) {
                alert('Please select a book first');
                return;
            }
            
            if (!gradeLevel) {
                alert('Please select a grade level');
                return;
            }
            
            const book = books[selectedBook];
            let questions = book.questions[gradeLevel];
            
            if (!questions) {
                alert('No questions available for this grade level');
                return;
            }
            
            const selectedQuestions = questions.slice(0, numQuestions);
            displayQuestions(selectedQuestions);
        }
        
        function displayQuestions(questions) {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            // Group by type
            const grouped = {};
            const typeOrder = ['Literal', 'Inferential', 'Analytical', 'Evaluative'];
            
            questions.forEach(q => {
                if (!grouped[q.type]) {
                    grouped[q.type] = [];
                }
                grouped[q.type].push(q);
            });
            
            typeOrder.forEach(type => {
                if (grouped[type]) {
                    // Add type header
                    const typeSection = document.createElement('div');
                    typeSection.className = 'question-type-section';
                    
                    const header = document.createElement('div');
                    header.className = 'question-type-header';
                    header.textContent = type.toUpperCase() + ' QUESTIONS';
                    typeSection.appendChild(header);
                    
                    // Add questions of this type
                    grouped[type].forEach((item, index) => {
                        const card = document.createElement('div');
                        card.className = 'question-card';
                        
                        let html = `<div class="question-number">Question ${questions.indexOf(item) + 1}</div>`;
                        html += `<div class="standard-label">Standard: ${item.standard}</div>`;
                        html += `<div class="question-text">${item.q}</div>`;
                        html += `<div class="answer-key">
                            <span class="answer-key-label">ANSWER KEY</span>
                            <div class="answer-key-text">${item.a}</div>
                        </div>`;
                        
                        if (item.f && item.f.length > 0) {
                            html += `<div class="follow-up-section">
                                <div class="follow-up-label">Follow-Up Questions to Extend Thinking</div>`;
                            item.f.forEach(followUp => {
                                html += `<div class="follow-up-item">• ${followUp}</div>`;
                            });
                            html += `</div>`;
                        }
                        
                        card.innerHTML = html;
                        typeSection.appendChild(card);
                    });
                    
                    container.appendChild(typeSection);
                }
            });
            
            document.getElementById('results').classList.add('show');
        }
    </script>
