<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bathysphere - Reading Comprehension Questions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px; text-align: center; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { font-size: 16px; opacity: 0.9; }
        .content { padding: 40px; }
        .section-label { display: block; font-weight: 600; margin-bottom: 12px; color: #333; font-size: 14px; }

        select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 16px; font-family: inherit; cursor: pointer; }
        select:focus { outline: none; border-color: #667eea; }

        .book-meta { background: #f5f5f5; padding: 15px; border-radius: 6px; margin: 20px 0; }
        .meta-item { margin: 8px 0; font-size: 14px; color: #555; }
        .meta-label { font-weight: 600; color: #333; }

        .mode-toggle { display: flex; gap: 10px; margin: 20px 0 10px; }
        .mode-btn { flex: 1; background: #f0f0f5; color: #555; border: 2px solid #e0e0e0; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .mode-btn:hover { border-color: #c3c9ff; }
        .mode-btn.active { background: #667eea; color: white; border-color: #667eea; }

        .settings { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group label { font-weight: 600; margin-bottom: 8px; color: #333; font-size: 14px; display: block; }

        button.gen-btn { width: 100%; background: #667eea; color: white; border: none; padding: 14px 24px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        button.gen-btn:hover:not(:disabled) { background: #764ba2; }
        button.gen-btn:disabled { background: #ccc; cursor: not-allowed; }

        .divider { height: 1px; background: #e0e0e0; margin: 30px 0; }
        .results { display: none; }
        .results.show { display: block; }
        .results h2 { color: #333; margin-bottom: 30px; font-size: 24px; }

        .question-type-section { margin-bottom: 40px; }
        .question-type-header { background: #667eea; color: white; padding: 12px 16px; border-radius: 6px; font-size: 18px; font-weight: 700; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .question-card { background: #f9f9f9; border-left: 5px solid #667eea; padding: 20px; margin-bottom: 20px; border-radius: 6px; }
        .question-number { font-weight: 700; color: #667eea; margin-bottom: 6px; font-size: 13px; }
        .standard-label { font-size: 11px; color: #999; margin-bottom: 10px; font-weight: 500; }
        .question-text { color: #333; margin-bottom: 15px; line-height: 1.6; font-size: 16px; font-weight: 500; }

        /* Open-ended */
        .answer-key { background: #e3f2fd; border-left: 4px solid #2196F3; padding: 12px; border-radius: 4px; margin-bottom: 12px; }
        .answer-key-label { font-weight: 700; color: #1976D2; display: block; margin-bottom: 6px; font-size: 11px; }
        .answer-key-text { color: #1565C0; font-size: 14px; line-height: 1.5; font-style: italic; }
        .follow-up-section { background: #f0f7ff; padding: 12px; border-radius: 4px; margin-top: 12px; border-left: 3px solid #64B5F6; }
        .follow-up-label { font-weight: 600; color: #1565C0; font-size: 12px; margin-bottom: 8px; text-transform: uppercase; }
        .follow-up-item { color: #1565C0; font-size: 13px; margin-bottom: 6px; line-height: 1.5; }

        /* Multiple choice */
        .mc-options { margin-top: 6px; }
        .mc-option { display: flex; align-items: center; border: 2px solid #e0e0e0; border-radius: 6px; padding: 11px 14px; margin-bottom: 9px; cursor: pointer; font-size: 15px; color: #333; transition: all 0.15s; background: white; }
        .mc-option:hover { border-color: #667eea; background: #f5f6ff; }
        .mc-option .letter { font-weight: 700; color: #667eea; margin-right: 10px; min-width: 20px; }
        .mc-option.answered { cursor: default; }
        .mc-option.answered:hover { background: white; border-color: #e0e0e0; }
        .mc-option.correct { border-color: #2e7d32; background: #e8f5e9; color: #2e7d32; }
        .mc-option.correct .letter { color: #2e7d32; }
        .mc-option.incorrect { border-color: #c62828; background: #ffebee; color: #c62828; }
        .mc-option.incorrect .letter { color: #c62828; }
        .mc-feedback { font-size: 13px; margin-top: 8px; font-weight: 600; }
        .mc-feedback.right { color: #2e7d32; }
        .mc-feedback.wrong { color: #c62828; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Bathysphere</h1>
            <p>Reading-comprehension questions across four levels, in open-ended or multiple-choice form — aligned to CCSS ELA standards</p>
        </div>

        <div class="content">
            <span class="section-label">Step 1: Choose a book</span>
            <select id="bookSelect" onchange="updateBookInfo()">
                <option value="">-- Select a Book --</option>
            </select>

            <div class="book-meta" id="bookMeta" style="display:none;">
                <div class="meta-item"><span class="meta-label">Title:</span> <span id="bookTitle">-</span></div>
                <div class="meta-item"><span class="meta-label">Author:</span> <span id="bookAuthor">-</span></div>
                <div class="meta-item"><span class="meta-label">Grade Band:</span> <span id="bookBand">-</span></div>
            </div>

            <div id="controls" style="display:none;">
                <span class="section-label">Step 2: Choose a question format</span>
                <div class="mode-toggle">
                    <button class="mode-btn active" id="modeOpenBtn" onclick="setMode('open')">✍️ Open-Ended (with answer keys)</button>
                    <button class="mode-btn" id="modeMcBtn" onclick="setMode('mc')">☑️ Multiple Choice Quiz</button>
                </div>

                <div class="settings">
                    <div class="form-group">
                        <label for="numQuestions">Number of Questions:</label>
                        <select id="numQuestions">
                            <option value="4">4 Questions</option>
                            <option value="5" selected>5 Questions (all)</option>
                        </select>
                    </div>
                </div>

                <button class="gen-btn" id="genBtn" onclick="generate()">Generate Questions</button>
            </div>

            <div class="results" id="results">
                <div class="divider"></div>
                <h2 id="resultsTitle">Generated Questions</h2>
                <div id="questionsContainer"></div>
            </div>
        </div>
    </div>

    <script>
        // Grade bands, in order.
        const BANDS = ["K-1", "1-2", "3-4", "5-6", "7-8", "8-9", "9-10", "11-12"];
        const BAND_LABELS = {
            "K-1": "Kindergarten – Grade 1", "1-2": "Grades 1 – 2", "3-4": "Grades 3 – 4",
            "5-6": "Grades 5 – 6", "7-8": "Grades 7 – 8", "8-9": "Grades 8 – 9",
            "9-10": "Grades 9 – 10", "11-12": "Grades 11 – 12"
        };

        // Each question: { type, standard, q, a (open answer), f [follow-ups], choices [4], correct (index) }
        const books = {
            aesop: { title: "Aesop's Fables", author: "Aesop", band: "K-1", questions: [
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.1.1 — Ask and answer questions about key details in a text.",
                  q:"In \"The Tortoise and the Hare,\" who wins the race?", a:"The Tortoise wins the race.",
                  f:["Why does the Tortoise win even though he is slow?","What was the Hare doing while the Tortoise kept going?"],
                  choices:["The Hare","The Tortoise","The Owl","The Fox"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.1.3 — Describe characters, settings, and major events in a story.",
                  q:"Why does the Hare stop during the race?", a:"He is so far ahead that he decides to take a nap.",
                  f:["What happens while the Hare is napping?","Was napping a good choice? Why not?"],
                  choices:["He gets hurt","He takes a nap because he is sure he will win","He goes home for lunch","He gets lost"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.1.3 — Describe characters using key details.",
                  q:"What kind of character is the Tortoise?", a:"He is slow but steady, patient, and never gives up.",
                  f:["Which word fits the Tortoise better: 'lazy' or 'determined'?","How does not giving up help him?"],
                  choices:["Fast and careless","Slow but steady and determined","Mean and tricky","Scared and shy"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.1.2 — Retell stories and demonstrate understanding of the central message or lesson.",
                  q:"What lesson does this fable teach?", a:"Slow and steady wins the race — keep trying and do not give up.",
                  f:["Can you think of a time when being steady helped you?","Why is 'never give up' a good lesson?"],
                  choices:["Always take a nap","Slow and steady wins the race","Running is bad for you","Rabbits are the fastest"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.1.1 — Ask and answer questions about key details.",
                  q:"Was the Hare a good sport? Why or why not?", a:"No — he bragged and was careless, so he lost. A good sport tries hard and is kind.",
                  f:["What should the Hare have done differently?","How would you feel if you were the Tortoise?"],
                  choices:["Yes, he was kind and careful","No, he bragged and was careless","Yes, he helped the Tortoise","No, he cheated to win"], correct:1 }
            ]},
            peter: { title: "The Tale of Peter Rabbit", author: "Beatrix Potter", band: "1-2", questions: [
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.2.1 — Ask and answer who, what, where, when, why, and how.",
                  q:"Where does Peter's mother tell him NOT to go?", a:"Into Mr. McGregor's garden.",
                  f:["Why is the garden dangerous for Peter?","What happened to Peter's father there?"],
                  choices:["The deep forest","Mr. McGregor's garden","Down by the river","Into the barn"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.2.3 — Describe how characters respond to events.",
                  q:"What does Peter do as soon as his mother leaves?", a:"He runs straight to Mr. McGregor's garden, disobeying her.",
                  f:["Did Peter obey his mother?","What might happen because he disobeyed?"],
                  choices:["He takes a nap","He goes to the garden anyway","He picks berries with his sisters","He hides at home"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.2.3 — Describe how characters respond to challenges.",
                  q:"What kind of character is Peter?", a:"He is curious and disobedient — he does not listen to his mother.",
                  f:["How is Peter different from his sisters?","What gets Peter into trouble?"],
                  choices:["Obedient and careful","Curious and disobedient","Sleepy and calm","Shy and quiet"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.2.2 — Recount stories and determine their central message or lesson.",
                  q:"What is the main lesson of the story?", a:"Listening to your parents keeps you safe; disobeying can lead to trouble.",
                  f:["What trouble did Peter get into?","How did Peter feel at the end?"],
                  choices:["Gardens are fun places","Listening to your parents keeps you safe","Rabbits love carrots","Running is dangerous"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.2.1 — Use details to support an answer.",
                  q:"Do you think Peter learned his lesson? Use the story to explain.", a:"Answers vary; he got sick and lost his clothes, so he likely learned to be more careful next time.",
                  f:["What happened to Peter's jacket and shoes?","What would you tell Peter?"],
                  choices:["He learned nothing at all","He probably learned to listen after getting into trouble","He was rewarded for disobeying","He never returned home"], correct:1 }
            ]},
            alice: { title: "Alice's Adventures in Wonderland", author: "Lewis Carroll", band: "3-4", questions: [
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.3.1 — Refer to details when explaining what a text says.",
                  q:"Who does Alice follow down the rabbit hole?", a:"The White Rabbit.",
                  f:["What was unusual about the White Rabbit?","Why did Alice decide to follow him?"],
                  choices:["The Cheshire Cat","The White Rabbit","The Mad Hatter","The Queen of Hearts"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.3.3 — Describe characters and explain how their actions affect events.",
                  q:"What happens to Alice when she drinks from the bottle labeled \"DRINK ME\"?", a:"She shrinks and becomes very small.",
                  f:["What does the cake labeled 'EAT ME' do to her?","Why is changing size a problem for Alice?"],
                  choices:["She grows taller","She shrinks and becomes very small","She falls asleep","She turns into a rabbit"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.3.3 — Describe characters and their traits.",
                  q:"What does Alice's choice to follow the Rabbit show about her?", a:"She is very curious and adventurous.",
                  f:["Is being curious always safe?","How does curiosity lead Alice into strange situations?"],
                  choices:["She is lazy","She is curious and adventurous","She is angry","She is afraid of everything"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.4.2 — Determine a theme and summarize the text.",
                  q:"How is Wonderland different from the real world?", a:"In Wonderland the normal rules of logic and size do not apply — strange, impossible things happen.",
                  f:["Name one impossible thing that happens in Wonderland.","Why might the author create such a strange place?"],
                  choices:["It is exactly like the real world","Its normal rules of logic and size do not apply","It is an ordinary school","It has no characters at all"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.4.1 — Refer to details and examples to support inferences.",
                  q:"Would you want to visit Wonderland? Support your opinion with details from the story.", a:"Answers vary; it is exciting and magical but also confusing and sometimes dangerous.",
                  f:["What would be the best part of Wonderland?","What would be the scariest part?"],
                  choices:["There is no way to answer","Answers vary, supported by details like its magic and its dangers","Only 'no' can be correct","Only 'yes' can be correct"], correct:1 }
            ]},
            tomsawyer: { title: "The Adventures of Tom Sawyer", author: "Mark Twain", band: "5-6", questions: [
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.5.1 — Quote accurately when explaining the text and drawing inferences.",
                  q:"How does Tom avoid whitewashing the fence himself?", a:"He tricks other boys into thinking it is fun, so they pay him for the chance to do it.",
                  f:["What does Tom collect from the other boys?","What does this trick show about Tom?"],
                  choices:["He asks his aunt to do it","He tricks other boys into doing it for him","He runs away from home","He paints it very fast"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.5.3 — Compare and contrast characters.",
                  q:"Who is Tom's close friend that lives freely, without rules?", a:"Huckleberry Finn.",
                  f:["Why do the other boys envy Huck?","How are Tom and Huck alike and different?"],
                  choices:["Becky Thatcher","Huckleberry Finn","Aunt Polly","His brother Sid"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.5.2 — Determine a theme from details in the text.",
                  q:"What does the fence trick reveal about people?", a:"People often want what seems hard to get; making a chore look like a privilege makes others want it.",
                  f:["Have you ever wanted something more because it seemed special?","How does Tom use this idea to his advantage?"],
                  choices:["People love doing chores","People want what seems hard to get or special","People never share anything","People hate all games"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.6.2 — Determine a theme and how it develops.",
                  q:"What is one theme of Tom Sawyer?", a:"Growing up means balancing mischief with moral choices — Tom must decide between fun and doing what is right.",
                  f:["Give an example of Tom doing something right.","How does Tom change during the story?"],
                  choices:["Painting fences is hard work","Growing up means balancing mischief with doing what is right","Rivers are always dangerous","Friends do not matter"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.6.6 — Explain how an author develops a point of view.",
                  q:"Is Tom a good role model? Use evidence from the story to explain.", a:"Answers vary; he is clever and brave but also dishonest and mischievous.",
                  f:["What is one admirable thing Tom does?","What is one thing you would not copy?"],
                  choices:["He is a perfect role model","Answers vary — he is clever and brave but also mischievous","He is only ever bad","He does nothing important"], correct:1 }
            ]},
            sherlock: { title: "The Adventures of Sherlock Holmes", author: "Arthur Conan Doyle", band: "7-8", questions: [
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.7.1 — Cite textual evidence to support analysis.",
                  q:"What is Sherlock Holmes's profession?", a:"He is a detective who solves mysteries.",
                  f:["Who assists Holmes and narrates his cases?","What tools and skills does Holmes rely on?"],
                  choices:["A doctor","A detective","A lawyer","A schoolteacher"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.7.3 — Analyze how elements of a story interact.",
                  q:"How does Holmes usually solve his cases?", a:"By carefully observing small details and using logical deduction.",
                  f:["What kind of small clue might Holmes notice that others miss?","Why is Dr. Watson often amazed?"],
                  choices:["By guessing at random","By observing details and using logical deduction","By asking the police for answers","By pure luck"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.7.3 — Analyze how characters' actions reveal ideas.",
                  q:"What does Holmes's method suggest about the value of observation?", a:"Careful observation of small details can reveal large truths that others overlook.",
                  f:["How can careful observation help you in everyday life?","Why do others miss what Holmes sees?"],
                  choices:["Details never matter","Small details can reveal big truths","Only the police can solve crimes","Guessing is the best method"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.8.2 — Determine a theme and analyze its development, including the plot.",
                  q:"How does Doyle build suspense in the Holmes stories?", a:"By presenting a puzzling mystery, withholding the solution, and revealing clues gradually through Watson's narration.",
                  f:["Why tell the stories through Watson instead of Holmes?","How does revealing clues gradually keep readers interested?"],
                  choices:["By explaining everything immediately","By presenting a puzzle and revealing clues gradually","By avoiding any mystery","By using no clues at all"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.8.6 — Analyze differing points of view.",
                  q:"Are Holmes's methods always ethical? Justify your view with reasons.", a:"Answers vary; his logic is impressive, but he sometimes uses deception or bends the rules.",
                  f:["When might deception be justified in solving a crime?","Should a detective always follow every rule?"],
                  choices:["They are always wrong","Answers vary — impressive logic, but sometimes deceptive","They are never effective","He follows every rule perfectly"], correct:1 }
            ]},
            carol: { title: "A Christmas Carol", author: "Charles Dickens", band: "8-9", questions: [
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.8.1 — Cite textual evidence that supports analysis.",
                  q:"Who visits Scrooge first on Christmas Eve?", a:"The ghost of his old business partner, Jacob Marley.",
                  f:["What warning does Marley give Scrooge?","Why is Marley's ghost bound in heavy chains?"],
                  choices:["The Ghost of Christmas Past","Jacob Marley's ghost","Bob Cratchit","Tiny Tim"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.8.3 — Analyze how dialogue and events propel the action.",
                  q:"How many spirits visit Scrooge after Marley?", a:"Three — the Ghosts of Christmas Past, Present, and Yet to Come.",
                  f:["What does each ghost show Scrooge?","Which visit seems to affect Scrooge the most?"],
                  choices:["One","Two","Three","Five"], correct:2 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.9-10.2 — Determine a theme and analyze its development.",
                  q:"Why does Dickens have the ghosts show Scrooge scenes from different times?", a:"To make Scrooge see the consequences of his choices and inspire him to change.",
                  f:["How does seeing his past affect Scrooge?","What future does the last ghost reveal?"],
                  choices:["To confuse and frighten him only","To help him see the consequences of his choices and change","Just to entertain him","To punish Tiny Tim"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.9-10.2 — Analyze how a theme develops over the text.",
                  q:"What is the central theme of A Christmas Carol?", a:"People can change — generosity and compassion can redeem even a hardened heart.",
                  f:["How is Scrooge different at the end of the story?","What causes his transformation?"],
                  choices:["Money is the only thing that matters","People can change through compassion and generosity","Christmas is just an ordinary day","Ghosts are real and everywhere"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.9-10.6 — Analyze a point of view or purpose.",
                  q:"Is Scrooge's transformation believable? Support your answer with evidence.", a:"Answers vary; the intense visions give him strong reasons to change, though some readers find the change sudden.",
                  f:["What evidence shows Scrooge has truly changed?","Do people really change this way in real life?"],
                  choices:["It is completely impossible","Answers vary — the visions give strong reasons, though some find it sudden","It never actually happens","He stays exactly the same"], correct:1 }
            ]},
            frankenstein: { title: "Frankenstein", author: "Mary Shelley", band: "9-10", questions: [
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.9-10.1 — Cite strong textual evidence.",
                  q:"Who creates the creature in the novel?", a:"Victor Frankenstein, a young scientist.",
                  f:["Why does Victor create the creature?","How does Victor react to what he has made?"],
                  choices:["The creature makes itself","Victor Frankenstein","Captain Walton","Elizabeth"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.9-10.3 — Analyze how characters develop and interact.",
                  q:"How does Victor feel about the creature after bringing it to life?", a:"He is horrified and abandons it.",
                  f:["What does the creature want from Victor?","How does being abandoned affect the creature?"],
                  choices:["Proud and loving","Horrified, and he abandons it","Completely indifferent","Frightened but caring"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.9-10.3 — Analyze how motivations advance the plot.",
                  q:"Why does the creature turn to violence?", a:"He is rejected and treated cruelly by everyone, so loneliness and anger drive him toward revenge.",
                  f:["Who rejects the creature?","Is the creature responsible, or is Victor — or both?"],
                  choices:["He is born evil","Rejection and loneliness drive him to revenge","He simply enjoys it","He is ordered to by Victor"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.9-10.2 — Determine a theme and analyze its development.",
                  q:"What theme does Frankenstein explore through Victor's actions?", a:"The dangers of unchecked ambition and the responsibility a creator has for what they make.",
                  f:["What responsibility does Victor abandon?","How could the tragedy have been avoided?"],
                  choices:["The pure joy of science","The dangers of unchecked ambition and responsibility","The beauty of nature only","The importance of great wealth"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.9-10.6 — Analyze point of view and purpose.",
                  q:"Who is more to blame for the tragedy — Victor or the creature? Defend your view with evidence.", a:"Answers vary; strong responses weigh Victor's abandonment against the creature's own choices, using text evidence.",
                  f:["What evidence supports blaming Victor?","What evidence supports blaming the creature?"],
                  choices:["Only the creature is to blame","Answers vary — weigh Victor's abandonment against the creature's choices","Only Elizabeth is to blame","No one is responsible"], correct:1 }
            ]},
            pride: { title: "Pride and Prejudice", author: "Jane Austen", band: "11-12", questions: [
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.11-12.1 — Cite strong and thorough textual evidence.",
                  q:"What is Mrs. Bennet's main goal for her daughters?", a:"To get them married to wealthy men.",
                  f:["Why is marriage so important for the Bennet daughters?","How does this goal drive the plot?"],
                  choices:["To send them to university","To get them married well","To move them all to London","To make them go to work"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.11-12.3 — Analyze how characters develop over the course of a text.",
                  q:"What is Elizabeth Bennet's first impression of Mr. Darcy?", a:"She finds him proud, arrogant, and unpleasant.",
                  f:["What causes her first impression of him?","How does her opinion change over the novel?"],
                  choices:["Charming and kind","Proud and unpleasant","Shy and sweet","Foolish and silly"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.11-12.3 — Analyze the impact of the author's choices.",
                  q:"What do the words in the title, \"Pride and Prejudice,\" refer to?", a:"Darcy's pride and Elizabeth's prejudice, which both must overcome to understand each other.",
                  f:["How does Darcy show pride?","How does Elizabeth show prejudice?"],
                  choices:["The changing weather","Darcy's pride and Elizabeth's prejudice","A famous dance","The name of a town"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.11-12.2 — Determine two or more themes and analyze their development.",
                  q:"What is a central theme of Pride and Prejudice?", a:"First impressions can be misleading; true understanding requires looking past pride and prejudice.",
                  f:["How do Elizabeth and Darcy each grow and change?","How does Austen gently criticize the society of her time?"],
                  choices:["Money guarantees happiness","First impressions can mislead; real understanding requires looking deeper","Marriage is unimportant","Social class never matters at all"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.11-12.6 — Analyze a case in which meaning depends on point of view.",
                  q:"Does Elizabeth make the right choices about marriage? Justify with evidence.", a:"Answers vary; she refuses convenient matches and marries for love and respect, which most readers admire.",
                  f:["Why does Elizabeth reject Mr. Collins's proposal?","What finally changes her view of Darcy?"],
                  choices:["She never makes a choice","Answers vary — she refuses convenience and marries for love and respect","She marries only for money","She chooses to stay single forever"], correct:1 }
            ]}
        };

        // Build the dropdown, grouped by grade band.
        (function buildDropdown() {
            const sel = document.getElementById('bookSelect');
            BANDS.forEach(band => {
                const inBand = Object.keys(books).filter(k => books[k].band === band);
                if (!inBand.length) return;
                const group = document.createElement('optgroup');
                group.label = BAND_LABELS[band] + "  (" + band + ")";
                inBand.forEach(k => {
                    const o = document.createElement('option');
                    o.value = k; o.textContent = books[k].title;
                    group.appendChild(o);
                });
                sel.appendChild(group);
            });
        })();

        let mode = 'open';

        function updateBookInfo() {
            const key = document.getElementById('bookSelect').value;
            const meta = document.getElementById('bookMeta');
            const controls = document.getElementById('controls');
            document.getElementById('results').classList.remove('show');
            if (!key || !books[key]) { meta.style.display = 'none'; controls.style.display = 'none'; return; }
            const b = books[key];
            document.getElementById('bookTitle').textContent = b.title;
            document.getElementById('bookAuthor').textContent = b.author;
            document.getElementById('bookBand').textContent = BAND_LABELS[b.band] + " (" + b.band + ")";
            meta.style.display = 'block';
            controls.style.display = 'block';
        }

        function setMode(m) {
            mode = m;
            document.getElementById('modeOpenBtn').classList.toggle('active', m === 'open');
            document.getElementById('modeMcBtn').classList.toggle('active', m === 'mc');
            document.getElementById('results').classList.remove('show');
        }

        function generate() {
            const key = document.getElementById('bookSelect').value;
            if (!key || !books[key]) return;
            const num = parseInt(document.getElementById('numQuestions').value, 10) || 5;
            const questions = books[key].questions.slice(0, num);
            displayQuestions(questions, books[key].title);
        }

        function displayQuestions(questions, title) {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            document.getElementById('resultsTitle').textContent =
                (mode === 'mc' ? "Multiple-Choice Quiz" : "Open-Ended Questions & Answer Keys") + " — " + title;

            const typeOrder = ['Literal', 'Inferential', 'Analytical', 'Evaluative'];
            const grouped = {};
            questions.forEach(q => { (grouped[q.type] = grouped[q.type] || []).push(q); });

            typeOrder.forEach(type => {
                if (!grouped[type]) return;
                const section = document.createElement('div');
                section.className = 'question-type-section';
                const header = document.createElement('div');
                header.className = 'question-type-header';
                header.textContent = type.toUpperCase() + ' QUESTIONS';
                section.appendChild(header);

                grouped[type].forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'question-card';
                    const n = questions.indexOf(item) + 1;
                    let html = '<div class="question-number">Question ' + n + '</div>';
                    html += '<div class="standard-label">Standard: ' + escapeHtml(item.standard) + '</div>';
                    html += '<div class="question-text">' + escapeHtml(item.q) + '</div>';
                    card.innerHTML = html;

                    if (mode === 'mc') {
                        card.appendChild(buildMc(item));
                    } else {
                        card.appendChild(buildOpen(item));
                    }
                    section.appendChild(card);
                });
                container.appendChild(section);
            });

            document.getElementById('results').classList.add('show');
            document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function buildOpen(item) {
            const wrap = document.createElement('div');
            let html = '<div class="answer-key"><span class="answer-key-label">ANSWER KEY</span>' +
                       '<div class="answer-key-text">' + escapeHtml(item.a) + '</div></div>';
            if (Array.isArray(item.f) && item.f.length) {
                html += '<div class="follow-up-section"><div class="follow-up-label">Follow-Up Questions to Extend Thinking</div>';
                item.f.forEach(f => { html += '<div class="follow-up-item">• ' + escapeHtml(f) + '</div>'; });
                html += '</div>';
            }
            wrap.innerHTML = html;
            return wrap;
        }

        function buildMc(item) {
            const wrap = document.createElement('div');
            wrap.className = 'mc-options';
            const letters = ['A', 'B', 'C', 'D'];
            let answered = false;
            const feedback = document.createElement('div');

            item.choices.forEach((choice, i) => {
                const opt = document.createElement('div');
                opt.className = 'mc-option';
                opt.innerHTML = '<span class="letter">' + letters[i] + '</span><span>' + escapeHtml(choice) + '</span>';
                opt.onclick = function () {
                    if (answered) return;
                    answered = true;
                    const all = wrap.querySelectorAll('.mc-option');
                    all.forEach(o => o.classList.add('answered'));
                    all[item.correct].classList.add('correct');
                    if (i === item.correct) {
                        feedback.className = 'mc-feedback right';
                        feedback.textContent = '✓ Correct!';
                    } else {
                        opt.classList.add('incorrect');
                        feedback.className = 'mc-feedback wrong';
                        feedback.textContent = '✗ Not quite — the correct answer is ' + letters[item.correct] + '.';
                    }
                };
                wrap.appendChild(opt);
            });
            wrap.appendChild(feedback);
            return wrap;
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }
    </script>
</body>
</html>
