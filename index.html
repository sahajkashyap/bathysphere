<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bathysphere - Reading Comprehension Questions</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px; text-align: center; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header p { font-size: 16px; opacity: 0.9; }
        .content { padding: 40px; }
        .section-label { display: block; font-weight: 600; margin-bottom: 12px; color: #333; font-size: 14px; }

        select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 16px; font-family: inherit; cursor: pointer; }
        select:focus { outline: none; border-color: #667eea; }

        .book-meta { background: #f5f5f5; padding: 15px; border-radius: 6px; margin: 20px 0; }
        .meta-item { margin: 8px 0; font-size: 14px; color: #555; }
        .meta-label { font-weight: 600; color: #333; }

        .mode-toggle { display: flex; gap: 10px; margin: 20px 0 10px; }
        .mode-btn { flex: 1; background: #f0f0f5; color: #555; border: 2px solid #e0e0e0; padding: 14px; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .mode-btn:hover { border-color: #c3c9ff; }
        .mode-btn.active { background: #667eea; color: white; border-color: #667eea; }

        .settings { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group label { font-weight: 600; margin-bottom: 8px; color: #333; font-size: 14px; display: block; }

        button.gen-btn { width: 100%; background: #667eea; color: white; border: none; padding: 14px 24px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.3s; }
        button.gen-btn:hover:not(:disabled) { background: #764ba2; }
        button.gen-btn:disabled { background: #ccc; cursor: not-allowed; }

        .divider { height: 1px; background: #e0e0e0; margin: 30px 0; }
        .results { display: none; }
        .results.show { display: block; }
        .results h2 { color: #333; margin-bottom: 30px; font-size: 24px; }

        .question-type-section { margin-bottom: 40px; }
        .question-type-header { background: #667eea; color: white; padding: 12px 16px; border-radius: 6px; font-size: 18px; font-weight: 700; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        .question-card { background: #f9f9f9; border-left: 5px solid #667eea; padding: 20px; margin-bottom: 20px; border-radius: 6px; }
        .question-number { font-weight: 700; color: #667eea; margin-bottom: 6px; font-size: 13px; }
        .standard-label { font-size: 11px; color: #999; margin-bottom: 10px; font-weight: 500; }
        .question-text { color: #333; margin-bottom: 15px; line-height: 1.6; font-size: 16px; font-weight: 500; }

        .answer-key { background: #e3f2fd; border-left: 4px solid #2196F3; padding: 12px; border-radius: 4px; margin-bottom: 12px; }
        .answer-key-label { font-weight: 700; color: #1976D2; display: block; margin-bottom: 6px; font-size: 11px; }
        .answer-key-text { color: #1565C0; font-size: 14px; line-height: 1.5; font-style: italic; }
        .follow-up-section { background: #f0f7ff; padding: 12px; border-radius: 4px; margin-top: 12px; border-left: 3px solid #64B5F6; }
        .follow-up-label { font-weight: 600; color: #1565C0; font-size: 12px; margin-bottom: 8px; text-transform: uppercase; }
        .follow-up-item { color: #1565C0; font-size: 13px; margin-bottom: 6px; line-height: 1.5; }

        .mc-options { margin-top: 6px; }
        .mc-option { display: flex; align-items: center; border: 2px solid #e0e0e0; border-radius: 6px; padding: 11px 14px; margin-bottom: 9px; cursor: pointer; font-size: 15px; color: #333; transition: all 0.15s; background: white; }
        .mc-option:hover { border-color: #667eea; background: #f5f6ff; }
        .mc-option .letter { font-weight: 700; color: #667eea; margin-right: 10px; min-width: 20px; }
        .mc-option.answered { cursor: default; }
        .mc-option.answered:hover { background: white; border-color: #e0e0e0; }
        .mc-option.correct { border-color: #2e7d32; background: #e8f5e9; color: #2e7d32; }
        .mc-option.correct .letter { color: #2e7d32; }
        .mc-option.incorrect { border-color: #c62828; background: #ffebee; color: #c62828; }
        .mc-option.incorrect .letter { color: #c62828; }
        .mc-feedback { font-size: 13px; margin-top: 8px; font-weight: 600; }
        .mc-feedback.right { color: #2e7d32; }
        .mc-feedback.wrong { color: #c62828; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Bathysphere</h1>
            <p>Reading-comprehension questions across four levels, in open-ended or multiple-choice form — aligned to CCSS ELA standards</p>
        </div>

        <div class="content">
            <span class="section-label">Step 1: Choose a book</span>
            <select id="bookSelect" onchange="updateBookInfo()">
                <option value="">-- Select a Book --</option>
            </select>

            <div class="book-meta" id="bookMeta" style="display:none;">
                <div class="meta-item"><span class="meta-label">Title:</span> <span id="bookTitle">-</span></div>
                <div class="meta-item"><span class="meta-label">Author:</span> <span id="bookAuthor">-</span></div>
                <div class="meta-item"><span class="meta-label">Grade Band:</span> <span id="bookBand">-</span></div>
            </div>

            <div id="controls" style="display:none;">
                <span class="section-label">Step 2: Choose a question format</span>
                <div class="mode-toggle">
                    <button class="mode-btn active" id="modeOpenBtn" onclick="setMode('open')">✍️ Open-Ended (with answer keys)</button>
                    <button class="mode-btn" id="modeMcBtn" onclick="setMode('mc')">☑️ Multiple Choice Quiz</button>
                </div>

                <div class="settings">
                    <div class="form-group">
                        <label for="numQuestions">Number of Questions:</label>
                        <select id="numQuestions">
                            <option value="5">5 Questions</option>
                            <option value="8">8 Questions</option>
                            <option value="10" selected>10 Questions (all)</option>
                        </select>
                    </div>
                </div>

                <button class="gen-btn" id="genBtn" onclick="generate()">Generate Questions</button>
            </div>

            <div class="results" id="results">
                <div class="divider"></div>
                <h2 id="resultsTitle">Generated Questions</h2>
                <div id="questionsContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const BANDS = ["K-1", "1-2", "3-4", "5-6", "7-8", "8-9", "9-10", "11-12"];
        const BAND_LABELS = {
            "K-1": "Kindergarten – Grade 1", "1-2": "Grades 1 – 2", "3-4": "Grades 3 – 4",
            "5-6": "Grades 5 – 6", "7-8": "Grades 7 – 8", "8-9": "Grades 8 – 9",
            "9-10": "Grades 9 – 10", "11-12": "Grades 11 – 12"
        };

        // 10 questions per book, ordered so any slice covers the four levels.
        const books = {
            aesop: { title: "Aesop's Fables", author: "Aesop", band: "K-1", questions: [
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.1.1 — Ask and answer questions about key details in a text.",
                  q:"In \"The Tortoise and the Hare,\" who wins the race?", a:"The Tortoise wins the race.",
                  f:["Why does the Tortoise win even though he is slow?","What was the Hare doing while the Tortoise kept going?"],
                  choices:["The Hare","The Tortoise","The Owl","The Fox"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.1.3 — Describe characters using key details.",
                  q:"What kind of character is the Tortoise?", a:"He is slow but steady, patient, and never gives up.",
                  f:["Which word fits the Tortoise better: 'lazy' or 'determined'?","How does not giving up help him?"],
                  choices:["Fast and careless","Slow but steady and determined","Mean and tricky","Scared and shy"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.1.2 — Determine the central message or lesson.",
                  q:"What lesson does \"The Tortoise and the Hare\" teach?", a:"Slow and steady wins the race — keep trying and do not give up.",
                  f:["Can you think of a time when being steady helped you?","Why is 'never give up' a good lesson?"],
                  choices:["Always take a nap","Slow and steady wins the race","Running is bad for you","Rabbits are the fastest"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.1.1 — Use key details to support an answer.",
                  q:"Was the Hare a good sport? Why or why not?", a:"No — he bragged and was careless, so he lost. A good sport tries hard and stays kind.",
                  f:["What should the Hare have done differently?","How would you feel if you were the Tortoise?"],
                  choices:["Yes, he was kind and careful","No, he bragged and was careless","Yes, he helped the Tortoise","No, he cheated to win"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.1.3 — Describe major events in a story.",
                  q:"Why does the Hare stop during the race?", a:"He is so far ahead that he decides to take a nap.",
                  f:["What happens while the Hare is napping?","Was napping a good choice? Why not?"],
                  choices:["He gets hurt","He takes a nap because he is sure he will win","He goes home for lunch","He gets lost"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.1.3 — Describe characters and their actions.",
                  q:"In \"The Lion and the Mouse,\" why is the little Mouse able to help the big Lion?", a:"Even though the Mouse is tiny, he is grateful and chews the net to free the Lion.",
                  f:["How can a small friend help a big one?","Why did the Lion let the Mouse go earlier?"],
                  choices:["Because he is the strongest","Because even a small friend can help, and he is grateful","Because he is a lion too","Because he is scared"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.1.2 — Determine the lesson of a story.",
                  q:"What lesson does \"The Lion and the Mouse\" teach?", a:"No act of kindness is ever wasted — even the smallest friend can help you.",
                  f:["How did kindness come back to help the Lion?","Why should we be kind to everyone?"],
                  choices:["Big animals are best","No act of kindness is wasted","Mice are scary","Never help anyone"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.1.1 — Support an opinion with details.",
                  q:"Would you rather be the hard-working Ant or the playful Grasshopper? Explain.", a:"Answers vary; the Ant plans ahead and stays safe, while the Grasshopper has fun but is unprepared for winter.",
                  f:["Why is it smart to plan ahead?","Can you both work and have fun?"],
                  choices:["There is no good answer","Answers vary — the Ant plans ahead; the Grasshopper is unprepared","Only the Grasshopper is right","Only the Ant is right"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.1.1 — Ask and answer questions about key details.",
                  q:"In \"The Ant and the Grasshopper,\" what does the Ant do all summer?", a:"The Ant works hard to gather and store food.",
                  f:["What does the Grasshopper do all summer?","Why is the Ant ready for winter?"],
                  choices:["Sleeps all day","Works hard and stores food","Sings songs","Runs races"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.1.2 — Understand the message of a story.",
                  q:"Why does the Grasshopper have no food when winter comes?", a:"Because he played all summer instead of preparing, so he did not save any food.",
                  f:["What could the Grasshopper have done differently?","How does planning ahead help the Ant?"],
                  choices:["He lost his food","He played all summer instead of preparing","Winter never came","The Ant took it"], correct:1 }
            ]},
            peter: { title: "The Tale of Peter Rabbit", author: "Beatrix Potter", band: "1-2", questions: [
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.2.1 — Ask and answer who, what, where, when, why, how.",
                  q:"Where does Peter's mother tell him NOT to go?", a:"Into Mr. McGregor's garden.",
                  f:["Why is the garden dangerous for Peter?","What happened to Peter's father there?"],
                  choices:["The deep forest","Mr. McGregor's garden","Down by the river","Into the barn"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.2.3 — Describe how characters respond to challenges.",
                  q:"What kind of character is Peter?", a:"He is curious and disobedient — he does not listen to his mother.",
                  f:["How is Peter different from his sisters?","What gets Peter into trouble?"],
                  choices:["Obedient and careful","Curious and disobedient","Sleepy and calm","Shy and quiet"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.2.2 — Determine the central message or lesson.",
                  q:"What is the main lesson of the story?", a:"Listening to your parents keeps you safe; disobeying can lead to trouble.",
                  f:["What trouble did Peter get into?","How did Peter feel at the end?"],
                  choices:["Gardens are fun places","Listening to your parents keeps you safe","Rabbits love carrots","Running is dangerous"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.2.1 — Use details to support an answer.",
                  q:"Do you think Peter learned his lesson? Use the story to explain.", a:"Answers vary; he got sick and lost his clothes, so he likely learned to be more careful.",
                  f:["What happened to Peter's jacket and shoes?","What would you tell Peter?"],
                  choices:["He learned nothing","He probably learned to listen after getting into trouble","He was rewarded for disobeying","He never returned home"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.2.3 — Describe how characters respond to events.",
                  q:"What does Peter do as soon as his mother leaves?", a:"He runs straight to Mr. McGregor's garden, disobeying her.",
                  f:["Did Peter obey his mother?","What might happen because he disobeyed?"],
                  choices:["He takes a nap","He goes to the garden anyway","He picks berries with his sisters","He hides at home"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.2.3 — Describe how characters respond to events.",
                  q:"Why does Peter feel sick at the end of the day?", a:"He ate too much in the garden and was frightened, so his mother gives him medicine.",
                  f:["What do his sisters get for supper instead?","How is Peter's evening different from theirs?"],
                  choices:["He caught a cold","He ate too much and was scared in the garden","He ran too fast for fun","He was simply hungry"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.2.3 — Explain how a character's actions shape events.",
                  q:"How do Peter's choices move the story along?", a:"Because Peter disobeys and enters the garden, the exciting chase and his troubles happen.",
                  f:["What would happen if Peter had stayed home?","Do a character's choices shape a story?"],
                  choices:["Peter does nothing","Peter's choice to disobey causes the chase and trouble","The garden causes everything by itself","Nothing happens at all"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.2.1 — Support an opinion with details.",
                  q:"Was Peter's mother fair to give him only medicine while his sisters had a treat? Explain.", a:"Answers vary; it may seem like a gentle, fair consequence for disobeying.",
                  f:["What was Peter's consequence?","How would you handle it if you were his mother?"],
                  choices:["It was very unfair","Answers vary — it may be a fair, gentle consequence","She should have given him more treats","She was too mean"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.2.1 — Ask and answer questions about key details.",
                  q:"Who chases Peter around the garden?", a:"Mr. McGregor.",
                  f:["Why is Mr. McGregor angry?","What does Peter lose while running away?"],
                  choices:["A dog","Mr. McGregor","His mother","A cat"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.2.2 — Understand the message of a story.",
                  q:"What does the author show by having Peter lose his jacket and shoes?", a:"That disobeying can cost you something and lead to trouble.",
                  f:["Where does Peter leave his clothes?","What does Mr. McGregor do with them?"],
                  choices:["Clothes are unimportant","Disobeying can cost you something","Gardens have no fences","Rabbits cannot run"], correct:1 }
            ]},
            alice: { title: "Alice's Adventures in Wonderland", author: "Lewis Carroll", band: "3-4", questions: [
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.3.1 — Refer to details when explaining a text.",
                  q:"Who does Alice follow down the rabbit hole?", a:"The White Rabbit.",
                  f:["What was unusual about the White Rabbit?","Why did Alice decide to follow him?"],
                  choices:["The Cheshire Cat","The White Rabbit","The Mad Hatter","The Queen of Hearts"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.3.3 — Describe characters and their traits.",
                  q:"What does Alice's choice to follow the Rabbit show about her?", a:"She is very curious and adventurous.",
                  f:["Is being curious always safe?","How does curiosity lead Alice into strange situations?"],
                  choices:["She is lazy","She is curious and adventurous","She is angry","She is afraid of everything"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.4.2 — Determine a theme and summarize the text.",
                  q:"How is Wonderland different from the real world?", a:"In Wonderland the normal rules of logic and size do not apply — strange, impossible things happen.",
                  f:["Name one impossible thing that happens in Wonderland.","Why might the author create such a strange place?"],
                  choices:["It is exactly like the real world","Its normal rules of logic and size do not apply","It is an ordinary school","It has no characters at all"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.4.1 — Refer to details to support inferences.",
                  q:"Would you want to visit Wonderland? Support your opinion with details.", a:"Answers vary; it is exciting and magical but also confusing and sometimes dangerous.",
                  f:["What would be the best part of Wonderland?","What would be the scariest part?"],
                  choices:["There is no way to answer","Answers vary, supported by its magic and its dangers","Only 'no' can be correct","Only 'yes' can be correct"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.3.3 — Describe how characters' actions affect events.",
                  q:"What happens to Alice when she drinks from the bottle labeled \"DRINK ME\"?", a:"She shrinks and becomes very small.",
                  f:["What does the cake labeled 'EAT ME' do to her?","Why is changing size a problem for Alice?"],
                  choices:["She grows taller","She shrinks and becomes very small","She falls asleep","She turns into a rabbit"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.3.4 — Determine the meaning of words as used in a text.",
                  q:"When the Cheshire Cat says everyone in Wonderland is \"mad,\" what does \"mad\" mean here?", a:"It means silly or crazy, not angry.",
                  f:["How do the characters act 'mad'?","Give an example of a silly character."],
                  choices:["Angry","Silly or crazy","Sad","Sleepy"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.4.3 — Describe a character and how actions affect the plot.",
                  q:"How does Alice's changing size affect what she can do?", a:"Her size decides whether she can fit through doors and reach things, so it controls where she can go.",
                  f:["When does being small help her? When does it hurt?","Why does the author keep changing her size?"],
                  choices:["Size does not matter","Her size decides where she can go and reach","She is always the same","Size makes her invisible"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.4.3 — Support ideas about characters with details.",
                  q:"Which Wonderland character would you most want to meet, and why?", a:"Answers vary; students should name a character and give a reason based on the story.",
                  f:["What makes that character interesting?","What would you ask them?"],
                  choices:["No character is interesting","Answers vary — name a character and give a reason","Only the Rabbit counts","Nobody can be chosen"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.3.1 — Refer to details in the text.",
                  q:"What is the White Rabbit worried about being?", a:"Late — he keeps checking his pocket watch and hurrying.",
                  f:["What does the Rabbit keep looking at?","Where is the Rabbit hurrying to?"],
                  choices:["Hungry","Late for an appointment","Lost","Cold"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.3.3 — Describe characters' feelings and responses.",
                  q:"Why does Alice cry a \"pool of tears\"?", a:"She is upset and confused by all the changes, and while very large she cries so much the tears form a pool.",
                  f:["What happens when she shrinks near the pool?","How do her feelings change through the story?"],
                  choices:["She is happy","She is upset and confused by the strange changes","She spilled water","It is raining"], correct:1 }
            ]},
            tomsawyer: { title: "The Adventures of Tom Sawyer", author: "Mark Twain", band: "5-6", questions: [
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.5.1 — Quote accurately when explaining the text.",
                  q:"How does Tom avoid whitewashing the fence himself?", a:"He tricks other boys into thinking it is fun, so they pay him for the chance to do it.",
                  f:["What does Tom collect from the other boys?","What does this trick show about Tom?"],
                  choices:["He asks his aunt to do it","He tricks other boys into doing it for him","He runs away from home","He paints it very fast"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.5.2 — Determine a theme from details.",
                  q:"What does the fence trick reveal about people?", a:"People often want what seems hard to get; making a chore look like a privilege makes others want it.",
                  f:["Have you ever wanted something more because it seemed special?","How does Tom use this idea?"],
                  choices:["People love doing chores","People want what seems hard to get or special","People never share","People hate all games"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.6.2 — Determine a theme and how it develops.",
                  q:"What is one theme of Tom Sawyer?", a:"Growing up means balancing mischief with moral choices — Tom must choose between fun and doing right.",
                  f:["Give an example of Tom doing something right.","How does Tom change during the story?"],
                  choices:["Painting fences is hard work","Growing up means balancing mischief with doing what is right","Rivers are always dangerous","Friends do not matter"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.6.6 — Explain how an author develops a point of view.",
                  q:"Is Tom a good role model? Use evidence from the story to explain.", a:"Answers vary; he is clever and brave but also dishonest and mischievous.",
                  f:["What is one admirable thing Tom does?","What is one thing you would not copy?"],
                  choices:["He is a perfect role model","Answers vary — clever and brave but also mischievous","He is only ever bad","He does nothing important"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.5.3 — Compare and contrast characters.",
                  q:"Who is Tom's close friend that lives freely, without rules?", a:"Huckleberry Finn.",
                  f:["Why do the other boys envy Huck?","How are Tom and Huck alike and different?"],
                  choices:["Becky Thatcher","Huckleberry Finn","Aunt Polly","His brother Sid"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.5.3 — Explain how characters respond to challenges.",
                  q:"Why does Tom eventually testify at the trial?", a:"His conscience and sense of justice push him to tell the truth and save an innocent man.",
                  f:["What risk does Tom take by testifying?","How does this show Tom growing up?"],
                  choices:["He wants a reward","His conscience pushes him to save an innocent man","He is forced by his aunt","He only wants attention"], correct:1 },
                { type:"Analytical", standard:"CCSS.ELA-LITERACY.RL.6.3 — Describe how the setting shapes the plot.",
                  q:"How does the setting of a small river town shape the story?", a:"The town, cave, river, and island give Tom places for adventure, mischief, and danger.",
                  f:["Name two places where important events happen.","How would the story change in a big city?"],
                  choices:["Setting does not matter","The town and river give Tom places for adventure and danger","The story is set in a city","There is no real setting"], correct:1 },
                { type:"Evaluative", standard:"CCSS.ELA-LITERACY.RL.6.6 — Analyze how a character develops.",
                  q:"Does Tom change from the beginning to the end of the story? Use evidence.", a:"Answers vary; he grows braver and more responsible, though he keeps his playful spirit.",
                  f:["What is one brave thing Tom does?","What playful trait does he keep?"],
                  choices:["He never changes","Answers vary — he grows braver and more responsible","He becomes a villain","He disappears"], correct:1 },
                { type:"Literal", standard:"CCSS.ELA-LITERACY.RL.5.1 — Explain what the text says explicitly.",
                  q:"What frightening event do Tom and Huck witness in the graveyard?", a:"They see Injun Joe commit a murder.",
                  f:["Why are the boys afraid to tell?","How does this secret affect Tom?"],
                  choices:["A ghost appears","They witness Injun Joe commit a murder","They find buried gold","They see a big storm"], correct:1 },
                { type:"Inferential", standard:"CCSS.ELA-LITERACY.RL.5.2 — Determine a theme from details.",

        (function buildDropdown() {
            const sel = document.getElementById('bookSelect');
            BANDS.forEach(band => {
                const inBand = Object.keys(books).filter(k => books[k].band === band);
                if (!inBand.length) return;
                const group = document.createElement('optgroup');
                group.label = BAND_LABELS[band] + "  (" + band + ")";
                inBand.forEach(k => {
                    const o = document.createElement('option');
                    o.value = k; o.textContent = books[k].title;
                    group.appendChild(o);
                });
                sel.appendChild(group);
            });
        })();

        let mode = 'open';

        function updateBookInfo() {
            const key = document.getElementById('bookSelect').value;
            const meta = document.getElementById('bookMeta');
            const controls = document.getElementById('controls');
            document.getElementById('results').classList.remove('show');
            if (!key || !books[key]) { meta.style.display = 'none'; controls.style.display = 'none'; return; }
            const b = books[key];
            document.getElementById('bookTitle').textContent = b.title;
            document.getElementById('bookAuthor').textContent = b.author;
            document.getElementById('bookBand').textContent = BAND_LABELS[b.band] + " (" + b.band + ")";
            meta.style.display = 'block';
            controls.style.display = 'block';
        }

        function setMode(m) {
            mode = m;
            document.getElementById('modeOpenBtn').classList.toggle('active', m === 'open');
            document.getElementById('modeMcBtn').classList.toggle('active', m === 'mc');
            document.getElementById('results').classList.remove('show');
        }

        function generate() {
            const key = document.getElementById('bookSelect').value;
            if (!key || !books[key]) return;
            const num = parseInt(document.getElementById('numQuestions').value, 10) || 10;
            if (mode === 'mc') {
                displayMc(getMcQuestions(key).slice(0, num), books[key].title);
            } else {
                displayOpen(books[key].questions.slice(0, num), books[key].title);
            }
        }

        // Quiz set = all non-opinion questions (Literal/Inferential/Analytical) + two extras.
        function getMcQuestions(key) {
            const base = books[key].questions
                .filter(q => q.type !== 'Evaluative')
                .map(q => ({ q: q.q, choices: q.choices, correct: q.correct, standard: q.standard }));
            return base.concat(EXTRA_MC[key] || []);
        }

        // Open-ended: grouped by the four cognitive levels, with answer keys + follow-ups.
        function displayOpen(questions, title) {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            document.getElementById('resultsTitle').textContent = "Open-Ended Questions & Answer Keys — " + title;

            const typeOrder = ['Literal', 'Inferential', 'Analytical', 'Evaluative'];
            const grouped = {};
            questions.forEach(q => { (grouped[q.type] = grouped[q.type] || []).push(q); });

            let n = 0;
            typeOrder.forEach(type => {
                if (!grouped[type]) return;
                const section = document.createElement('div');
                section.className = 'question-type-section';
                const header = document.createElement('div');
                header.className = 'question-type-header';
                header.textContent = type.toUpperCase() + ' QUESTIONS';
                section.appendChild(header);

                grouped[type].forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'question-card';
                    n += 1;
                    let html = '<div class="question-number">Question ' + n + '</div>';
                    html += '<div class="standard-label">Standard: ' + escapeHtml(item.standard) + '</div>';
                    html += '<div class="question-text">' + escapeHtml(item.q) + '</div>';
                    card.innerHTML = html;
                    card.appendChild(buildOpen(item));
                    section.appendChild(card);
                });
                container.appendChild(section);
            });
            showResults();
        }

        // Multiple choice: a flat list of comprehension questions — no level labels.
        function displayMc(questions, title) {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            document.getElementById('resultsTitle').textContent = "Multiple-Choice Comprehension Quiz — " + title;

            const section = document.createElement('div');
            section.className = 'question-type-section';
            const header = document.createElement('div');
            header.className = 'question-type-header';
            header.textContent = 'COMPREHENSION QUESTIONS';
            section.appendChild(header);

            questions.forEach((item, i) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                let html = '<div class="question-number">Question ' + (i + 1) + '</div>';
                html += '<div class="standard-label">Standard: ' + escapeHtml(item.standard) + '</div>';
                html += '<div class="question-text">' + escapeHtml(item.q) + '</div>';
                card.innerHTML = html;
                card.appendChild(buildMc(item));
                section.appendChild(card);
            });
            container.appendChild(section);
            showResults();
        }

        function showResults() {
            document.getElementById('results').classList.add('show');
            document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function buildOpen(item) {
            const wrap = document.createElement('div');
            let html = '<div class="answer-key"><span class="answer-key-label">ANSWER KEY</span>' +
                       '<div class="answer-key-text">' + escapeHtml(item.a) + '</div></div>';
            if (Array.isArray(item.f) && item.f.length) {
                html += '<div class="follow-up-section"><div class="follow-up-label">Follow-Up Questions to Extend Thinking</div>';
                item.f.forEach(f => { html += '<div class="follow-up-item">• ' + escapeHtml(f) + '</div>'; });
                html += '</div>';
            }
            wrap.innerHTML = html;
            return wrap;
        }

        function buildMc(item) {
            const wrap = document.createElement('div');
            wrap.className = 'mc-options';
            const letters = ['A', 'B', 'C', 'D'];
            let answered = false;
            const feedback = document.createElement('div');

            item.choices.forEach((choice, i) => {
                const opt = document.createElement('div');
                opt.className = 'mc-option';
                opt.innerHTML = '<span class="letter">' + letters[i] + '</span><span>' + escapeHtml(choice) + '</span>';
                opt.onclick = function () {
                    if (answered) return;
                    answered = true;
                    const all = wrap.querySelectorAll('.mc-option');
                    all.forEach(o => o.classList.add('answered'));
                    all[item.correct].classList.add('correct');
                    if (i === item.correct) {
                        feedback.className = 'mc-feedback right';
                        feedback.textContent = '✓ Correct!';
                    } else {
                        opt.classList.add('incorrect');
                        feedback.className = 'mc-feedback wrong';
                        feedback.textContent = '✗ Not quite — the correct answer is ' + letters[item.correct] + '.';
                    }
                };
                wrap.appendChild(opt);
            });
            wrap.appendChild(feedback);
            return wrap;
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }
    </script>
</body>
</html>
